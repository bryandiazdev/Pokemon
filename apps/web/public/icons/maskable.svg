<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Pokémon Stock Radar">
  <!-- Maskable variant: full-bleed background, art confined to the center
       safe zone so any platform mask (circle, squircle) never clips it. -->
  <defs>
    <linearGradient id="prism-m" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.55" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="sweep-m" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" fill="#0b0e12"/>
  <circle cx="32" cy="32" r="16.5" fill="none" stroke="url(#prism-m)" stroke-width="3.2"/>
  <path d="M16 32 H24" stroke="url(#prism-m)" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M40 32 H48" stroke="url(#prism-m)" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M32 32 L32 17 A15 15 0 0 1 46.2 27.5 Z" fill="url(#sweep-m)" opacity="0.6"/>
  <circle cx="32" cy="32" r="7" fill="#0b0e12" stroke="url(#prism-m)" stroke-width="3.2"/>
  <circle cx="32" cy="32" r="2.5" fill="#2dd4bf"/>
  <circle cx="41.5" cy="22.5" r="2.6" fill="#d9a441"/>
</svg>
