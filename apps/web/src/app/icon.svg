<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Pokémon Stock Radar">
  <!--
    Brand favicon: a radar screen drawn as a stylized ball — outer ring, the
    horizontal "belt" with a center hub (the radar dish doubling as the ball
    button), a holographic sweep, and a gold blip (a valuable card on the
    radar). Deliberately NOT the red/white trademark colorway: this is the
    app's own teal/gold/obsidian palette.
  -->
  <defs>
    <linearGradient id="prism" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.55" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="sweep" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Obsidian tile -->
  <rect width="64" height="64" rx="14" fill="#0b0e12"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#252d38" stroke-width="1"/>

  <!-- Ball ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#prism)" stroke-width="4"/>

  <!-- Belt: the ball's band, broken by the hub -->
  <path d="M10 32 H21" stroke="url(#prism)" stroke-width="4" stroke-linecap="round"/>
  <path d="M43 32 H54" stroke="url(#prism)" stroke-width="4" stroke-linecap="round"/>

  <!-- Radar sweep (upper-right quadrant) -->
  <path d="M32 32 L32 12 A20 20 0 0 1 51 26 Z" fill="url(#sweep)" opacity="0.6"/>

  <!-- Hub: ball button as radar dish -->
  <circle cx="32" cy="32" r="9" fill="#0b0e12" stroke="url(#prism)" stroke-width="4"/>
  <circle cx="32" cy="32" r="3.2" fill="#2dd4bf"/>

  <!-- Gold blip: a hit on the radar -->
  <circle cx="45" cy="19" r="3.4" fill="#d9a441"/>
</svg>
